name: Backend CD (Dev)
on:
  push:
    branches: [ "dev" ]

jobs:
  run-ci:
    name: Run Backend CI
    uses: ./.github/workflows/backend-ci.yml
    secrets:
      RAG_SCRAPING_GITHUB_TOKEN: ${{ secrets.RAG_SCRAPING_GITHUB_TOKEN }}
      CI_AWS_ACCESS_KEY: ${{ secrets.CI_AWS_ACCESS_KEY }}
      CI_AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_AWS_SECRET_ACCESS_KEY }}

  deploy-backend:
    name: Deploy backend to ECS (dev)
    needs: run-ci
    environment: dev
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-north-1
      ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
      ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "SHA=$SHA" >> $GITHUB_ENV

          docker build \
            --build-arg GITHUB_TOKEN=${{ secrets.RAG_SCRAPING_GITHUB_TOKEN }} \
            -t backend \
             backend

          docker tag backend $ECR_REPOSITORY:$SHA
          docker tag backend $ECR_REPOSITORY:dev

          docker push $ECR_REPOSITORY:$SHA
          docker push $ECR_REPOSITORY:dev

        
      - name: Force new deployment on ECS service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE

  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [run-ci, deploy-backend]

    if: failure()

    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORKFLOW: ${{ github.workflow }}
          DEVELOPER: ${{ github.actor }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(cat <<EOF
          {
            "text": ":x: *${WORKFLOW} failed*\n\
            *Developer:* ${DEVELOPER}\n\
            *Reason:* One or more steps in this job failed\n\
            <${RUN_URL}|View full logs>"
          }
          EOF
          )

          curl -X POST -H "Content-type: application/json" \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
